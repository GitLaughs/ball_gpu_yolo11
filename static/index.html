<!-- static/index.html -->

<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏀 AI 篮球投篮分析系统</title>
  <style>
    /* ═══════════════ 全局样式 ═══════════════ */
    :root {
      --bg-primary: #0f1923;
      --bg-secondary: #1a2634;
      --bg-card: #1e2d3d;
      --bg-card-hover: #243447;
      --accent: #ff6b35;
      --accent-light: #ff8c5a;
      --accent-dark: #e55a25;
      --success: #00e676;
      --success-dim: #00c853;
      --danger: #ff5252;
      --danger-dim: #e04545;
      --info: #40c4ff;
      --info-dim: #29b6f6;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #5f6368;
      --border: #2d3f50;
      --border-light: #3a4f63;
      --shadow: rgba(0, 0, 0, 0.4);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei',
        'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ═══════════════ 预处理遮罩 ═══════════════ */
    #preprocess-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 25, 35, 0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
    }

    #preprocess-overlay.active {
      display: flex;
    }

    .preprocess-box {
      text-align: center;
      padding: 48px 60px;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px var(--shadow);
      max-width: 500px;
    }

    .preprocess-box .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .preprocess-box h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .preprocess-box p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 8px;
    }

    #preprocess-msg {
      color: var(--text-primary);
      font-size: 15px;
      margin-top: 16px;
      min-height: 20px;
    }

    .progress-bar-outer {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    /* ═══════════════ 顶部栏 ═══════════════ */
    .topbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-logo {
      font-size: 28px;
      filter: drop-shadow(0 0 8px rgba(255, 107, 53, 0.4));
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: -2px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .device-badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .device-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: var(--transition);
    }

    .status-indicator .dot.running {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .status-indicator .dot.paused {
      background: #ffc107;
      box-shadow: 0 0 8px #ffc107;
    }

    /* ═══════════════ 主内容 ═══════════════ */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      padding: 16px 20px;
      min-height: calc(100vh - 64px);
    }

    /* ═══════════════ 卡片 ═══════════════ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--border-light);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
    }

    .card-header-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header-title .icon {
      font-size: 15px;
    }

    .card-body {
      padding: 16px;
    }

    /* ═══════════════ 控制栏 ═══════════════ */
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(255, 107, 53, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.5);
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
    }

    .btn-danger {
      background: rgba(255, 82, 82, 0.15);
      color: var(--danger);
      border-color: rgba(255, 82, 82, 0.3);
    }

    .btn-danger:hover {
      background: rgba(255, 82, 82, 0.25);
    }

    .btn-upload {
      background: rgba(64, 196, 255, 0.1);
      color: var(--info);
      border-color: rgba(64, 196, 255, 0.3);
    }

    .btn-upload:hover {
      background: rgba(64, 196, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
    }

    .controls-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .file-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 4px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ═══════════════ 视频区域 ═══════════════ */
    .video-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .video-main {
      position: relative;
    }

    .video-main .card-body {
      padding: 0;
    }

    .video-main img {
      width: 100%;
      display: block;
      border-radius: 0 0 var(--radius) var(--radius);
      background: #111;
      aspect-ratio: 640/480;
      object-fit: contain;
    }

    .video-secondary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .video-secondary img {
      width: 100%;
      display: block;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      background: #111;
      aspect-ratio: 640/480;
      object-fit: contain;
    }

    /* ═══════════════ 右侧面板 ═══════════════ */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── 投篮状态卡片 ─── */
    .shot-detection-card .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .phase-idle {
      background: rgba(95, 99, 104, 0.2);
      color: var(--text-muted);
    }

    .phase-rising {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .phase-tracking {
      background: rgba(255, 107, 53, 0.2);
      color: var(--accent);
    }

    .phase-cooldown {
      background: rgba(64, 196, 255, 0.2);
      color: var(--info);
    }

    /* ─── 得分统计 ─── */
    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .score-item {
      text-align: center;
      padding: 14px 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .score-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .score-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .score-value.scored {
      color: var(--success);
    }

    .score-value.total {
      color: var(--accent);
    }

    .score-value.accuracy {
      color: var(--info);
    }

    .score-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── 最近一投 ─── */
    .last-shot-content {
      margin-top: 8px;
    }

    .last-shot-result {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .last-shot-result.scored {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.3);
      color: var(--success);
    }

    .last-shot-result.missed {
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid rgba(255, 82, 82, 0.3);
      color: var(--danger);
    }

    .shot-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .shot-detail-item {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .shot-detail-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .shot-detail-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── 投篮历史 ─── */
    .history-list {
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .history-list::-webkit-scrollbar {
      width: 5px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      transition: var(--transition);
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .history-item .num {
      color: var(--text-muted);
      font-weight: 600;
      width: 28px;
    }

    .history-item .result-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 11px;
    }

    .result-badge.scored {
      background: rgba(0, 230, 118, 0.15);
      color: var(--success);
    }

    .result-badge.missed {
      background: rgba(255, 82, 82, 0.15);
      color: var(--danger);
    }

    .history-item .time {
      color: var(--text-muted);
    }

    .history-item .arc {
      color: var(--text-secondary);
    }

    .empty-msg {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ─── 系统信息 ─── */
    .sys-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .sys-item {
      text-align: center;
      padding: 10px 6px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .sys-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 3px;
    }

    .sys-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ═══════════════ 动画 ═══════════════ */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      animation: fadeIn 0.4s ease-out;
    }

    /* ═══════════════ 响应式 ═══════════════ */
    @media (max-width: 1100px) {
      .main {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: -1;
      }

      .video-secondary {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .topbar {
        padding: 0 12px;
      }

      .main {
        padding: 10px;
      }

      .controls-bar {
        gap: 6px;
      }

      .btn {
        padding: 6px 12px;
        font-size: 12px;
      }

      .score-value {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- ═══ 预处理遮罩 ═══ -->
  <div id="preprocess-overlay">
    <div class="preprocess-box">
      <div class="spinner"></div>
      <h2>🏀 视频预处理中</h2>
      <p>正在逐帧检测目标并构建轨迹，请稍候...</p>
      <div id="preprocess-msg">初始化中...</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="preprocess-bar"></div>
      </div>
    </div>
  </div>

  <!-- ═══ 顶部栏 ═══ -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🏀</span>
      <div>
        <div class="topbar-title">AI 篮球投篮分析系统</div>
        <div class="topbar-subtitle">实时双目视觉 · 深度学习目标检测 · 投篮轨迹分析</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-indicator">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">就绪</span>
      </div>
      <div class="device-badge">
        <span class="device-dot"></span>
        <span id="device-name">检测中...</span>
      </div>
    </div>
  </div>

  <!-- ═══ 主内容 ═══ -->
  <div class="main">

    <!-- ─── 左侧: 视频+控制 ─── -->
    <div class="video-section">

      <!-- 控制栏 -->
      <div class="controls-bar">
        <button class="btn btn-primary" id="btn-start" onclick="startDetection()">
          ▶ 开始分析
        </button>
        <button class="btn btn-secondary" id="btn-pause" onclick="togglePause()" disabled>
          ⏸ 暂停
        </button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopDetection()" disabled>
          ⏹ 停止
        </button>
        <div class="controls-sep"></div>
        <button class="btn btn-upload" onclick="document.getElementById('file-input').click()">
          📁 选择视频
        </button>
        <input type="file" id="file-input" accept=".avi,.mp4,.mov,.mkv,.flv,.wmv" style="display:none"
          onchange="uploadVideo(this)">
        <span class="file-label" id="file-label">ball.avi</span>
      </div>

      <!-- 主视频(左相机+轨迹) -->
      <div class="card video-main">
        <div class="card-header">
          <span class="card-header-title">
            <span class="icon">📹</span> 左相机 · 轨迹追踪
          </span>
          <span class="card-header-title" style="color:var(--accent);" id="frame-info">
            帧: 0/0
          </span>
        </div>
        <div class="card-body">
          <img id="video-left" src="" alt="左相机画面">
        </div>
      </div>

      <!-- 副视频(右相机+深度图) -->
      <div class="video-secondary">
        <div class="card">
          <div class="card-header">
            <span class="card-header-title">
              <span class="icon">📷</span> 右相机
            </span>
          </div>
          <div class="card-body" style="padding:0">
            <img id="video-right" src="" alt="右相机画面">
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-header-title">
              <span class="icon">🌈</span> 深度图
            </span>
          </div>
          <div class="card-body" style="padding:0">
            <img id="video-depth" src="" alt="深度图">
          </div>
        </div>
      </div>
    </div>

    <!-- ─── 右侧: 数据面板 ─── -->
    <div class="sidebar">

      <!-- 投篮检测状态 -->
      <div class="card shot-detection-card">
        <div class="card-header">
          <span class="card-header-title">
            <span class="icon">🎯</span> 投篮检测
          </span>
          <span class="phase-badge phase-idle" id="phase-badge">等待中</span>
        </div>
        <div class="card-body">
          <div class="score-grid">
            <div class="score-item">
              <div class="score-value scored" id="scored-count">0</div>
              <div class="score-label">命中</div>
            </div>
            <div class="score-item">
              <div class="score-value total" id="total-shots">0</div>
              <div class="score-label">出手</div>
            </div>
            <div class="score-item">
              <div class="score-value accuracy" id="accuracy">0%</div>
              <div class="score-label">命中率</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 最近一投 -->
      <div class="card">
        <div class="card-header">
          <span class="card-header-title">
            <span class="icon">📊</span> 最近一投
          </span>
        </div>
        <div class="card-body">
          <div class="last-shot-content" id="last-shot-content">
            <div class="empty-msg">等待投篮中...</div>
          </div>
        </div>
      </div>

      <!-- 投篮历史 -->
      <div class="card">
        <div class="card-header">
          <span class="card-header-title">
            <span class="icon">📜</span> 投篮历史
          </span>
          <span style="font-size:12px;color:var(--text-muted)" id="history-count">0 次</span>
        </div>
        <div class="card-body" style="padding:8px 12px">
          <div class="history-list" id="history-list">
            <div class="empty-msg">暂无投篮记录</div>
          </div>
        </div>
      </div>

      <!-- 系统状态 -->
      <div class="card">
        <div class="card-header">
          <span class="card-header-title">
            <span class="icon">⚙️</span> 系统状态
          </span>
        </div>
        <div class="card-body">
          <div class="sys-grid">
            <div class="sys-item">
              <div class="sys-value" id="sys-fps">0</div>
              <div class="sys-label">FPS</div>
            </div>
            <div class="sys-item">
              <div class="sys-value" id="sys-latency">0</div>
              <div class="sys-label">延迟 (ms)</div>
            </div>
            <div class="sys-item">
              <div class="sys-value" id="sys-gpu">-</div>
              <div class="sys-label">GPU (GB)</div>
            </div>
            <div class="sys-item">
              <div class="sys-value" id="sys-ball">0</div>
              <div class="sys-label">篮球</div>
            </div>
            <div class="sys-item">
              <div class="sys-value" id="sys-hoop">0</div>
              <div class="sys-label">篮筐</div>
            </div>
            <div class="sys-item">
              <div class="sys-value" id="sys-frame">0</div>
              <div class="sys-label">当前帧</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ═══════════════ 前端逻辑 ═══════════════ */
    const API = '';
    let pollTimer = null;
    let isRunning = false;
    let isPaused = false;

    // ─── 视频流 ───
    function startStreams() {
      const ts = Date.now();
      document.getElementById('video-left').src = `${API}/api/video_feed/left?t=${ts}`;
      document.getElementById('video-right').src = `${API}/api/video_feed/right?t=${ts}`;
      document.getElementById('video-depth').src = `${API}/api/video_feed/depth?t=${ts}`;
    }
    function stopStreams() {
      document.getElementById('video-left').src = '';
      document.getElementById('video-right').src = '';
      document.getElementById('video-depth').src = '';
    }

    // ─── 控制 ───
    async function startDetection() {
      try {
        const res = await fetch(`${API}/api/start`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          isRunning = true; isPaused = false;
          updateButtons();
          startStreams();
          startPolling();
        }
      } catch (e) { console.error(e); }
    }

    async function togglePause() {
      try {
        const res = await fetch(`${API}/api/pause`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          isPaused = data.paused;
          updateButtons();
        }
      } catch (e) { console.error(e); }
    }

    async function stopDetection() {
      try {
        await fetch(`${API}/api/stop`, { method: 'POST' });
        isRunning = false; isPaused = false;
        updateButtons();
        stopPolling();
        stopStreams();
      } catch (e) { console.error(e); }
    }

    async function uploadVideo(input) {
      if (!input.files.length) return;
      const file = input.files[0];
      const fd = new FormData();
      fd.append('video', file);
      try {
        const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
          document.getElementById('file-label').textContent = data.filename;
        } else {
          alert(data.message || '上传失败');
        }
      } catch (e) { alert('上传出错'); }
      input.value = '';
    }

    function updateButtons() {
      const start = document.getElementById('btn-start');
      const pause = document.getElementById('btn-pause');
      const stop = document.getElementById('btn-stop');
      start.disabled = isRunning;
      pause.disabled = !isRunning;
      stop.disabled = !isRunning;
      pause.innerHTML = isPaused ? '▶ 继续' : '⏸ 暂停';

      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      dot.className = 'dot' + (isRunning ? (isPaused ? ' paused' : ' running') : '');
      txt.textContent = isRunning ? (isPaused ? '已暂停' : '运行中') : '就绪';
    }

    // ─── 轮询 ───
    function startPolling() { stopPolling(); pollTimer = setInterval(pollStatus, 400); }
    function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

    const phaseMap = {
      idle: { text: '等待中', cls: 'phase-idle' },
      rising: { text: '上升中...', cls: 'phase-rising' },
      tracking: { text: '追踪中!', cls: 'phase-tracking' },
      cooldown: { text: '冷却中', cls: 'phase-cooldown' },
      preprocessing: { text: '预处理', cls: 'phase-idle' },
    };

    async function pollStatus() {
      try {
        const res = await fetch(`${API}/api/status`);
        const data = await res.json();
        if (!data.success) return;

        const s = data.stats;
        const shot = data.shot_info;

        // 运行状态
        isRunning = data.is_running;
        isPaused = data.is_paused;
        updateButtons();

        if (!data.is_running && !data.is_preprocessing) {
          stopPolling();
          return;
        }

        // 预处理遮罩
        const overlay = document.getElementById('preprocess-overlay');
        if (data.is_preprocessing) {
          overlay.classList.add('active');
          document.getElementById('preprocess-msg').textContent =
            data.preprocess_progress || '处理中...';
          const pct = s.total_frames > 0
            ? (s.current_frame / s.total_frames * 100) : 0;
          document.getElementById('preprocess-bar').style.width = pct + '%';
        } else {
          overlay.classList.remove('active');
        }

        // 设备名
        document.getElementById('device-name').textContent = data.device || 'CPU';

        // 帧信息
        document.getElementById('frame-info').textContent =
          `帧: ${s.current_frame}/${s.total_frames}`;

        // 投篮阶段徽章
        const pi = phaseMap[shot.phase] || phaseMap.idle;
        const badge = document.getElementById('phase-badge');
        badge.textContent = pi.text;
        badge.className = 'phase-badge ' + pi.cls;

        // 得分统计
        document.getElementById('scored-count').textContent = shot.total_scored;
        document.getElementById('total-shots').textContent = shot.total_shots;
        document.getElementById('accuracy').textContent = shot.accuracy || '0%';

        // 最近一投
        updateLastShot(shot.last_shot);

        // 历史列表
        updateHistory(shot.shot_history);
        document.getElementById('history-count').textContent =
          `${(shot.shot_history || []).length} 次`;

        // 系统状态
        document.getElementById('sys-fps').textContent = s.fps || 0;
        document.getElementById('sys-latency').textContent = s.process_time || 0;
        document.getElementById('sys-gpu').textContent =
          s.gpu_memory > 0 ? s.gpu_memory : '-';
        document.getElementById('sys-ball').textContent = s.basketball_count || 0;
        document.getElementById('sys-hoop').textContent = s.hoops_count || 0;
        document.getElementById('sys-frame').textContent = s.current_frame || 0;

      } catch (e) { /* 忽略网络错误 */ }
    }

    function updateLastShot(shot) {
      const el = document.getElementById('last-shot-content');
      if (!shot) {
        el.innerHTML = '<div class="empty-msg">等待投篮中...</div>';
        return;
      }
      const isScored = shot.is_scored;
      el.innerHTML = `
        <div class="last-shot-result ${isScored ? 'scored' : 'missed'}">
            ${isScored ? '✅ 命中！' : '❌ 未中'}
        </div>
        <div class="shot-detail-grid">
            <div class="shot-detail-item">
                <div class="shot-detail-value">${shot.arc_height ?? '-'}</div>
                <div class="shot-detail-label">弧高 (px)</div>
            </div>
            <div class="shot-detail-item">
                <div class="shot-detail-value">${shot.duration ?? '-'}s</div>
                <div class="shot-detail-label">飞行时间</div>
            </div>
            <div class="shot-detail-item">
                <div class="shot-detail-value">
                    ${shot.release ? shot.release[0] + ', ' + shot.release[1] : '-'}
                </div>
                <div class="shot-detail-label">出手位置</div>
            </div>
            <div class="shot-detail-item">
                <div class="shot-detail-value">
                    ${shot.apex ? shot.apex[0] + ', ' + shot.apex[1] : '-'}
                </div>
                <div class="shot-detail-label">弧顶位置</div>
            </div>
        </div>
    `;
    }

    function updateHistory(history) {
      const el = document.getElementById('history-list');
      if (!history || history.length === 0) {
        el.innerHTML = '<div class="empty-msg">暂无投篮记录</div>';
        return;
      }
      // 倒序：最新的在顶部
      const items = [...history].reverse();
      let html = '';
      items.forEach((h, i) => {
        const num = history.length - i;
        const scored = h.is_scored;
        html += `
            <div class="history-item">
                <span class="num">#${num}</span>
                <span class="result-badge ${scored ? 'scored' : 'missed'}">
                    ${scored ? '命中' : '未中'}
                </span>
                <span class="arc">弧高 ${h.arc_height ?? '-'} px</span>
                <span class="time">${h.time || ''}</span>
            </div>
        `;
      });
      el.innerHTML = html;
    }

    // ─── 初始化 ───
    document.addEventListener('DOMContentLoaded', () => {
      updateButtons();
      // 启动轮询以检测后端初始状态
      startPolling();
    });
  </script>

</body>

</html>
